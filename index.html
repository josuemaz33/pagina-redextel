document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ation:none; font-size:14px; font-weight:600;\">+502 5200 1325 →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ff5252&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#d62839&quot;,&quot;#e23744&quot;,&quot;#ff5252&quot;,&quot;#a51d2a&quot;],&quot;section&quot;:&quot;Animación&quot;},&quot;voltage&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:8,&quot;min&quot;:2,&quot;max&quot;:14,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Animación&quot;},&quot;showGrid&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Animación&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.heroCanvasRef = React.createRef();\n    this.d3Refs = [React.createRef(), React.createRef(), React.createRef()];\n    this._d3 = []; // {raf, resize}\n    this.state = {\n      openFaq: 0,\n      form: { nombre:'', tipo:'Cerca eléctrica', detalle:'' }\n    };\n  }\n\n  componentDidMount(){\n    this.startAnim();\n    this.d3Refs.forEach((r,i)=> this.startFenceScene(r.current, i));\n  }\n  componentWillUnmount(){\n    cancelAnimationFrame(this._raf);\n    if(this._resize) window.removeEventListener('resize', this._resize);\n    if(this._parallaxCleanup) this._parallaxCleanup();\n    this._d3.forEach(d=>{ cancelAnimationFrame(d.raf); window.removeEventListener('resize', d.resize); });\n  }\n\n  // perspective electric-fence scene for the \"Diseños 3D\" cards\n  startFenceScene(canvas, variant){\n    if(!canvas) return;\n    const ctx = canvas.getContext('2d');\n    let w=0,h=0;\n    const resize=()=>{\n      const r=canvas.getBoundingClientRect(); if(!r.width) return;\n      const dpr=Math.min(window.devicePixelRatio||1,2);\n      w=r.width; h=r.height;\n      canvas.width=Math.round(w*dpr); canvas.height=Math.round(h*dpr);\n      ctx.setTransform(dpr,0,0,dpr,0,0);\n    };\n    resize();\n    const lerp=(a,b,t)=>a+(b-a)*t;\n    // variant config: 0 = wall-mounted angle, 1 = tall posts straight-on, 2 = corner/return\n    const cfg=[\n      { NP:{x:0.98,y:0.94}, VP:{x:0.05,y:0.34}, levels:[0.30,0.5,0.7,0.9], wall:true,  baseH:0.5 },\n      { NP:{x:0.92,y:0.96}, VP:{x:0.12,y:0.28}, levels:[0.22,0.4,0.58,0.76,0.94], wall:false, baseH:0.62 },\n      { NP:{x:1.0,y:0.9},  VP:{x:0.30,y:0.40}, levels:[0.28,0.5,0.72,0.94], wall:true,  baseH:0.46 },\n    ][variant%3];\n    const LEVELS=cfg.levels;\n    let pulses=[], sparks=[];\n    const ensure=(n)=>{ while(pulses.length<n) pulses.push({lvl:pulses.length%LEVELS.length, tp:Math.random(), sp:0.05+Math.random()*0.06}); if(pulses.length>n) pulses.length=n; };\n\n    const loop=(time)=>{\n      if(!w){ resize(); }\n      const t=time*0.001;\n      const accent=(this.props&&this.props.accent)||'#ff5252';\n      const volt=(this.props&&this.props.voltage!=null)?this.props.voltage:8;\n      const c=this.hexRgb(accent); const A=(a)=>`rgba(${c.r},${c.g},${c.b},${a})`;\n      ctx.clearRect(0,0,w,h);\n      const NP={x:w*cfg.NP.x,y:h*cfg.NP.y}, VP={x:w*cfg.VP.x,y:h*cfg.VP.y}, baseH=h*cfg.baseH;\n      const ground=(tp)=>({x:lerp(NP.x,VP.x,tp),y:lerp(NP.y,VP.y,tp)});\n      const wallTopAt=(tp)=>{ const g=ground(tp); return cfg.wall? {x:g.x,y:g.y-baseH*0.34*(1-tp*0.8)} : g; };\n      const wirePt=(tp,l)=>{ const b=wallTopAt(tp); return {x:b.x, y:b.y - baseH*(1-tp*0.82)*l}; };\n\n      // floor lines\n      ctx.lineWidth=1; ctx.strokeStyle=A(0.05);\n      for(let i=0;i<=10;i++){ const x0=lerp(-w*0.5,w*1.6,i/10); ctx.beginPath(); ctx.moveTo(x0,h); ctx.lineTo(VP.x,VP.y); ctx.stroke(); }\n\n      // solid wall band if variant uses a wall\n      if(cfg.wall){\n        ctx.beginPath();\n        for(let s=0;s<=30;s++){ const g=ground(s/30); s===0?ctx.moveTo(g.x,g.y):ctx.lineTo(g.x,g.y); }\n        for(let s=30;s>=0;s--){ const wt=wallTopAt(s/30); ctx.lineTo(wt.x,wt.y); }\n        ctx.closePath();\n        const wg=ctx.createLinearGradient(0,h*0.4,0,h); wg.addColorStop(0,'rgba(34,49,82,0.95)'); wg.addColorStop(1,'rgba(15,23,46,0.95)');\n        ctx.fillStyle=wg; ctx.fill();\n        ctx.strokeStyle='rgba(150,175,212,0.3)'; ctx.lineWidth=1.5; ctx.beginPath();\n        for(let s=0;s<=30;s++){ const wt=wallTopAt(s/30); s===0?ctx.moveTo(wt.x,wt.y):ctx.lineTo(wt.x,wt.y); } ctx.stroke();\n      }\n\n      // posts\n      const POSTS=[0,0.14,0.27,0.4,0.52,0.63,0.73,0.82,0.9];\n      ctx.lineCap='round';\n      POSTS.forEach(tp=>{\n        const b=wallTopAt(tp), top=wirePt(tp,LEVELS[LEVELS.length-1]+0.08);\n        ctx.strokeStyle=A(lerp(0.5,0.12,tp)); ctx.lineWidth=lerp(4,0.6,tp);\n        ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(top.x,top.y); ctx.stroke();\n        LEVELS.forEach(l=>{ const p=wirePt(tp,l); ctx.fillStyle=A(lerp(0.4,0.1,tp)); ctx.beginPath(); ctx.arc(p.x,p.y,lerp(2.4,0.5,tp),0,7); ctx.fill(); });\n      });\n      // wires\n      LEVELS.forEach((l,li)=>{ ctx.beginPath(); for(let s=0;s<=40;s++){ const p=wirePt(s/40,l); s===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); } ctx.strokeStyle=A(0.3+0.05*Math.sin(t*2+li)); ctx.lineWidth=1.3; ctx.stroke(); });\n\n      // pulses\n      ensure(Math.max(4,Math.round(volt*1.4)));\n      ctx.globalCompositeOperation='lighter';\n      pulses.forEach(pl=>{ pl.tp-=pl.sp*0.016*lerp(0.4,1.4,pl.tp); if(pl.tp<=0){pl.tp=1;pl.lvl=Math.floor(Math.random()*LEVELS.length);} const p=wirePt(pl.tp,LEVELS[pl.lvl]); const sz=lerp(1.2,5,1-pl.tp), gl=lerp(0.25,0.95,1-pl.tp); const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,sz*5); g.addColorStop(0,`rgba(255,235,228,${gl})`); g.addColorStop(0.3,A(gl*0.8)); g.addColorStop(1,A(0)); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,sz*5,0,7); ctx.fill(); ctx.fillStyle=`rgba(255,240,235,${gl})`; ctx.beginPath(); ctx.arc(p.x,p.y,sz*0.7,0,7); ctx.fill(); });
